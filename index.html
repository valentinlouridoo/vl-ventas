<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Valentín Ventas - Catálogo</title>

<style>
body{background:#0b0b0c;color:#fff;font-family:Arial;margin:0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:20px}
.card{background:#17171a;border-radius:15px;padding:10px}
.card img{width:100%;height:220px;object-fit:contain}
.name{font-weight:bold;margin-top:10px}
.price{color:#c9a227;font-weight:bold}
button{padding:8px 12px;margin-top:10px;border:none;border-radius:8px;background:#c9a227;cursor:pointer}
</style>
</head>

<body>

<h2 style="text-align:center;margin-top:20px;">Valentín Ventas</h2>

<div class="grid" id="products"></div>

<script>
const PRODUCTS = [

{ id:"airpods_pro2", name:"AirPods Pro 2 (sello ANC)", img:"airpods-pro2.jpg", price:20000 },

{ id:"tv", name:"Tokyo Style TV Stick con apps instaladas", img:"tvstick.jpg", price:33000 },

{ id:"go4", name:"Parlante Go 4 Pro RGB", img:"go4-1.jpg", price:25000 },

{ id:"camiseta_normal", name:"Camiseta Argentina normal", img:"camiseta-argentina-normal.jpg", price:40000 },

{ id:"camiseta_termica", name:"Camiseta Argentina termosellada", img:"camiseta-argentina-termosellada.jpg", price:40000 },

{ id:"patillera", name:"Patillera vintage", img:"patillera-vintage.jpg", price:12000 },

{ id:"adaptador20", name:"Adaptador 20W + cable iPhone", img:"adaptador-20w.jpg", price:12000 },

{ id:"adaptador45", name:"Adaptador 45W", img:"adaptador-45w.jpg", price:15000 },

{ id:"cables", name:"Cables individuales", img:"cables-individuales.jpg", price:5000 },

{ id:"funda1", name:"Funda Silicone Premium", img:"funda-silicone-premium.jpg", price:13500 },

{ id:"funda2", name:"Funda MagSafe Mate", img:"funda-magsafe-mate.jpg", price:12000 },

{ id:"funda3", name:"Funda texturada MagSafe", img:"funda-texturada-magsafe.jpg", price:12000 },

{ id:"funda4", name:"Funda Puffer", img:"funda-puffer.jpg", price:10000 },

{ id:"funda5", name:"Funda MagSafe acrílica", img:"funda-magsafe-acrilica.jpg", price:10000 },

{ id:"templado", name:"Vidrio templado 9D", img:"templado-9d.jpg", price:5000 },

{ id:"pad80", name:"Pad gamer 80x30 cm", img:"pad-80x30.jpg", price:12000 },

{ id:"pad30", name:"Pad gamer 30x25 cm", img:"pad-30x25.jpg", price:9000 },

{ id:"led", name:"Luces LED", img:"luces-led.jpg", price:12000 },

{ id:"quencher", name:"Vaso Quencher", img:"quencher-1.jpg", price:20000 }

];

const container = document.getElementById("products");

PRODUCTS.forEach(p=>{
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${p.img}">
<div class="name">${p.name}</div>
<div class="price">$${p.price}</div>
<button>Agregar</button>
`;

container.appendChild(card);
});
</script>

</body>
</html>
